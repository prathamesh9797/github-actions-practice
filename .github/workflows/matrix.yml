name: Python Lint

on:
    push:
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repo
              uses: actions/checkout@v5

            - name: setup python 3.13
              uses: actions/setup-python@v5
              with:
               python-version: "3.13"

            - name: install dependencies
              run: pip install -r requirements.txt

            - name: run linter
              run: flake8 app.py