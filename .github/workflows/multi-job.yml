name: Multi Job Workflow

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: prints "Building the app"
              run: echo "Building the app"


    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: prints "Running tests"
              run: echo "Running tests"
    
    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: prints "Deploying"
              run: echo "Deploying"
