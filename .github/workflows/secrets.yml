name: Secrets Demo

on:
    workflow_dispatch:

jobs:
  check-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret exists
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi

      - name: try printing secret
        run: echo "${{ secrets.MY_SECRET_MESSAGE }}"